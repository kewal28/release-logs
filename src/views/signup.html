<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Release Log</title>
  <meta name="description" content="Create your Release Log account.">
  <link rel="stylesheet" href="/css/marketing.css">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="marketing bg-gray-50 min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <h1 class="text-2xl font-semibold text-center text-gray-900">Create account</h1>
    <p class="text-center text-sm text-gray-500 mt-2">We’ll email you a verification link</p>
    <form id="form" class="mt-8 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="name" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" minlength="6" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
      </div>
      <p id="err" class="text-sm text-red-600 hidden"></p>
      <button type="submit" class="w-full py-2.5 rounded-full bg-gray-900 text-white text-sm font-medium hover:bg-gray-800">Sign up</button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">Already have an account? <a href="/login" class="text-gray-900 underline">Sign in</a></p>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.classList.add('hidden');
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        err.textContent = data.error || (data.errors && data.errors[0] && data.errors[0].msg) || 'Sign up failed';
        err.classList.remove('hidden');
        return;
      }
      alert(data.message || 'Check your email to verify.');
      window.location.href = '/login';
    });
  </script>
</body>
</html>
